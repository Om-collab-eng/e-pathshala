{% extends "base.html" %}

{% block title %}Complete Profile - librika.in{% endblock %}

{% block content %}
<div class="login-container">
    <div class="auth-card" style="max-width: 480px;">
        <h1>Complete Profile</h1>
        <p>Your account is ready! Would you like to add your details now to access all features?</p>
        
        <form method="POST">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter Full Name" pattern="[A-Za-z\s]+">
            </div>
            <div class="input-group">
                <label for="admission_no">Admission Code</label>
                <input type="number" id="admission_no" name="admission_no" placeholder="e.g. 1022">
            </div>
            <div class="input-group">
                <label for="class">Class</label>
                <input type="text" id="class" name="class" placeholder="e.g. 12-A">
            </div>
            
            <button type="submit" class="btn-neon">Save Details</button>
            <a href="/student" class="btn-alt" style="width: 100%; margin-top: 1rem;">Skip for Now</a>
            
            <p style="margin-top: 1.5rem; text-align: center; color: var(--text-low); font-size: 0.8rem;">
                You can always update these in "My Profile" later.
            </p>
        </form>
    </div>
</div>
{% endblock %}
