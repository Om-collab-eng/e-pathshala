{% extends "base.html" %}

{% block title %}Join - librikia.in{% endblock %}

{% block content %}
<div class="login-container">
    <div class="auth-card">
        <h1>Join Institution</h1>
        <p>Link your identity to your institution's librikia.in</p>
        
        <form method="POST">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label for="school_code">Institution Code</label>
                <input type="text" id="school_code" name="school_code" placeholder="SCH-XXXXXX" required>
            </div>

            <div class="input-group">
                <label for="phone">Phone Number (Login ID)</label>
                <input type="text" id="phone" name="phone" placeholder="9876543210" required>
            </div>
            <div class="input-group">
                <label for="password">Security Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-neon">Register with Institution</button>
            
            <p style="margin-top: 2rem; margin-bottom: 0; text-align: center;">
                Already have an account? <a href="/login" style="color: var(--accent-primary); font-weight: 700; text-decoration: none;">Global Login</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
