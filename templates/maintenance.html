<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance | librika.in</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { color: #facc15; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 1.1rem; line-height: 1.6; }
        .admin-login {
            margin-top: 30px;
            display: inline-block;
            padding: 10px 20px;
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid rgba(99, 102, 241, 0.4);
            transition: all 0.3s;
        }
        .admin-login:hover { background: rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚧 Site Under Maintenance</h1>
        <p>librika.in is currently down for scheduled maintenance and upgrades. We are working hard to bring the platform back online shortly. Thank you for your patience!</p>
        <a href="/login" class="admin-login">Super Admin Access</a>
    </div>
</body>
</html>
