<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading: {{ content.title }} - librika.in</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #8b5cf6;
        }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        header {
            background: var(--panel-bg);
            padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }
        .toolbar {
            display: flex; gap: 15px; align-items: center;
        }
        button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 8px 12px;
            border-radius: 6px; cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: rgba(255,255,255,0.2); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: #7c3aed;
        }
        
        #pdf-container {
            flex: 1;
            overflow: auto;
            display: flex; justify-content: center;
            padding: 20px;
            background: #000;
        }
        canvas {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100%;
        }
        
        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #10b981; color: white;
            padding: 10px 20px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>

<header>
    <div>
        <h2 style="margin: 0; font-size: 1.2rem;">{{ content.title }}</h2>
        <p style="margin: 0; font-size: 0.8rem; color: #94a3b8;">{{ content.subject }} | Class {{ content.class }}</p>
    </div>
    
    <div class="toolbar">
        <button id="zoom-out">➖</button>
        <span id="zoom-val" style="font-size: 0.9rem;">100%</span>
        <button id="zoom-in">➕</button>
        
        <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.2); margin: 0 10px;"></div>
        
        <button id="prev-page">◀ Prev</button>
        <span style="font-size: 0.9rem;">Page <span id="page-num">{{ start_page }}</span> of <span id="page-count">--</span></span>
        <button id="next-page">Next ▶</button>
    </div>
    
    <div>
        <a href="/digital-library/content/{{ content.id }}" style="text-decoration: none;">
            <button class="btn-primary">Exit Reader</button>
        </a>
    </div>
</header>

<div id="pdf-container">
    <canvas id="pdf-render"></canvas>
</div>

<div id="toast" class="toast">🔖 Progress Saved</div>

<script>
    // PDF.js setup
    const url = '{{ content.file_url }}';
    const contentId = {{ content.id }};
    
    let pdfDoc = null,
        pageNum = {{ start_page }},
        pageIsRendering = false,
        pageNumIsPending = null;

    const scale = 1.2,
          canvas = document.getElementById('pdf-render'),
          ctx = canvas.getContext('2d');

    // Setup worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // Render the page
    const renderPage = num => {
        pageIsRendering = true;

        // Get page
        pdfDoc.getPage(num).then(page => {
            // Set scale
            const viewport = page.getViewport({ scale });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const renderCtx = {
                canvasContext: ctx,
                viewport
            };

            page.render(renderCtx).promise.then(() => {
                pageIsRendering = false;

                if (pageNumIsPending !== null) {
                    renderPage(pageNumIsPending);
                    pageNumIsPending = null;
                }
            });

            // Output current page
            document.getElementById('page-num').textContent = num;
            
            // Save progress to server
            saveProgress(num);
        });
    };

    // Check for pages rendering
    const queueRenderPage = num => {
        if (pageIsRendering) {
            pageNumIsPending = num;
        } else {
            renderPage(num);
        }
    };

    // Show Prev Page
    const showPrevPage = () => {
        if (pageNum <= 1) return;
        pageNum--;
        queueRenderPage(pageNum);
    };

    // Show Next Page
    const showNextPage = () => {
        if (pageNum >= pdfDoc.numPages) return;
        pageNum++;
        queueRenderPage(pageNum);
    };

    // Get Document
    pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
        pdfDoc = pdfDoc_;
        document.getElementById('page-count').textContent = pdfDoc.numPages;
        
        // Ensure start page is within bounds
        if(pageNum > pdfDoc.numPages) pageNum = pdfDoc.numPages;
        if(pageNum < 1) pageNum = 1;

        renderPage(pageNum);
    }).catch(err => {
        // Display error
        const div = document.createElement('div');
        div.className = 'error';
        div.appendChild(document.createTextNode('Error loading PDF: ' + err.message));
        document.querySelector('body').insertBefore(div, canvas);
        document.getElementById('pdf-container').style.display = 'none';
    });

    // Button Events
    document.getElementById('prev-page').addEventListener('click', showPrevPage);
    document.getElementById('next-page').addEventListener('click', showNextPage);
    
    // Zoom (Basic implementation)
    let currentScale = 1.0;
    document.getElementById('zoom-in').addEventListener('click', () => {
        currentScale += 0.2;
        canvas.style.transform = `scale(${currentScale})`;
        document.getElementById('zoom-val').innerText = Math.round(currentScale * 100) + '%';
    });
    document.getElementById('zoom-out').addEventListener('click', () => {
        if(currentScale > 0.4) currentScale -= 0.2;
        canvas.style.transform = `scale(${currentScale})`;
        document.getElementById('zoom-val').innerText = Math.round(currentScale * 100) + '%';
    });

    // Save Progress Ajax
    let saveTimeout = null;
    function saveProgress(page) {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(async () => {
            try {
                await fetch('/api/save-progress', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ content_id: contentId, page: page })
                });
                
                // Show toast
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2000);
            } catch(e) {
                console.error("Failed to save progress", e);
            }
        }, 1000); // Debounce saves by 1 second
    }
    // Security: Disable Inspect Element and Right-Click
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false; // F12
        if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'i'.charCodeAt(0))) return false; // Ctrl+Shift+I
        if(e.ctrlKey && e.shiftKey && (e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'c'.charCodeAt(0))) return false; // Ctrl+Shift+C
        if(e.ctrlKey && e.shiftKey && (e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'j'.charCodeAt(0))) return false; // Ctrl+Shift+J
        if(e.ctrlKey && (e.keyCode == 'U'.charCodeAt(0) || e.keyCode == 'u'.charCodeAt(0))) return false; // Ctrl+U
    };
</script>

</body>
</html>
