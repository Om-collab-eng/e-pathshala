{% extends "base.html" %}

{% block title %}Register Asset - librika.in{% endblock %}

{% block content %}
<div class="login-container">
    <div class="auth-card" style="max-width: 500px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 style="text-align: left; margin: 0;">New Asset</h1>
            <a href="/admin" class="btn-alt" style="padding: 6px 12px; font-size: 0.75rem;">Cancel</a>
        </div>
        <div style="background: rgba(139, 92, 246, 0.1); border: 1px solid var(--accent-primary); border-radius: 12px; padding: 1rem; text-align: center; margin-bottom: 2rem;">
            <p style="margin: 0; color: var(--text-light); font-weight: 500;">
                Tired of entering manually? <a href="/admin/scanner" style="color: var(--accent-primary); font-weight: bold; text-decoration: underline;">Try our ✨ Smart Scanner!</a>
            </p>
        </div>

        <form method="POST" onsubmit="showToast('Processing new asset...', 'info')">
            <div class="input-group">
                <label>Book Title</label>
                <input type="text" name="title" placeholder="e.g. Master Intelligence" required>
            </div>
            <div class="input-group">
                <label>Author Specification</label>
                <input type="text" name="author" placeholder="Full Author Name" required>
            </div>
            <div class="input-group">
                <label>Category Classification</label>
                <select name="genre" required>
                    <option value="" disabled selected>Select Genre</option>
                    <option value="Fiction">Fiction</option>
                    <option value="Non-Fiction">Non-Fiction</option>
                    <option value="Science">Science</option>
                    <option value="History">History</option>
                    <option value="Biography">Biography</option>
                    <option value="Comics">Comics</option>
                    <option value="Reference">Reference</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="input-group">
                <label>Inventory Count (Copies)</label>
                <input type="number" name="copies" value="1" min="1" required>
            </div>
            <div class="input-group">
                <label>ISBN (Optional)</label>
                <input type="text" name="isbn" placeholder="Leave blank to auto-generate barcode">
            </div>
            <div class="input-group">
                <label>Description (Optional)</label>
                <textarea name="description" rows="3" placeholder="Brief summary of the book..." style="width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border-color); border-radius: 12px; background: rgba(255,255,255,0.02); color: var(--text-light);"></textarea>
            </div>
            
            <div style="background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 2rem;">
                <p style="font-size: 0.75rem; color: var(--text-mid); text-align: center;">⚡ System will auto-generate barcode and indexing codes on submission if left blank.</p>
            </div>

            <button type="submit" class="btn-neon">Register & Process Barcode</button>
        </form>
    </div>
</div>
{% endblock %}
